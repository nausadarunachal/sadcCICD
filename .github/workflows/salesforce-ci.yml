name: Salesforce CI/CD

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      target_environment:
        description: "Choose target environment for manual deployment"
        required: true
        type: choice
        options:
          - qa

jobs:
  deploy-dev:
    name: Validate, Test, and Deploy to Dev
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli
          sf --version

      - name: Create JWT key file
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key

      - name: Authenticate to Dev Salesforce
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "${{ secrets.SF_INSTANCE_URL }}" \
            --alias dev-org

      - name: Validate deployment and run Apex tests
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --target-org dev-org \
            --test-level RunLocalTests \
            --coverage-formatters text-summary \
            --coverage-formatters json-summary \
            --coverage-formatters json \
            --results-dir coverage \
            --wait 30

      - name: Show Apex test and coverage details
        if: always()
        run: |          
          echo ""
          echo "========== CLASSES WITH INSUFFICIENT COVERAGE =========="
          if [ -f coverage/coverage/coverage-summary.json ]; then
            jq -r 'to_entries[] | select(.value.lines.pct < 75) | "  - \(.key): \(.value.lines.pct)% coverage (\(.value.lines.covered)/\(.value.lines.total) lines)"' coverage/coverage/coverage-summary.json 2>/dev/null || echo "Unable to parse coverage data"
          else
            echo "No coverage data available"
          fi
          
          echo ""
          echo "========== COVERAGE TEXT SUMMARY =========="
          if [ -f coverage/coverage/text-summary.txt ]; then
            cat coverage/coverage/text-summary.txt
          else
            echo "No text summary available"
          fi

      - name: Deploy to Dev
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org dev-org \
            --test-level RunLocalTests \
            --coverage-formatters text-summary \
            --coverage-formatters json-summary \
            --coverage-formatters json \
            --results-dir coverage-deploy \
            --wait 30

      - name: Upload Dev coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-apex-coverage
          path: |
            coverage
            coverage-deploy

  deploy-qa:
    name: Validate, Test, and Deploy to QA
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment == 'qa'
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli
          sf --version

      - name: Create JWT key file
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key

      - name: Authenticate to QA Salesforce
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "${{ secrets.SF_INSTANCE_URL }}" \
            --alias qa-org

      - name: Validate deployment and run Apex tests
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --target-org qa-org \
            --test-level RunLocalTests \
            --coverage-formatters text-summary \
            --coverage-formatters json-summary \
            --coverage-formatters json \
            --results-dir coverage \
            --wait 30

      - name: Show Apex test and coverage details
        if: always()
        run: |
          echo ""
          echo "========== CLASSES WITH INSUFFICIENT COVERAGE =========="
          if [ -f coverage/coverage/coverage-summary.json ]; then
            jq -r 'to_entries[] | select(.value.lines.pct < 75) | "  - \(.key): \(.value.lines.pct)% coverage (\(.value.lines.covered)/\(.value.lines.total) lines)"' coverage/coverage/coverage-summary.json 2>/dev/null || echo "Unable to parse coverage data"
          else
            echo "No coverage data available"
          fi
          
          echo ""
          echo "========== COVERAGE TEXT SUMMARY =========="
          if [ -f coverage/coverage/text-summary.txt ]; then
            cat coverage/coverage/text-summary.txt
          else
            echo "No text summary available"
          fi

      - name: Deploy to QA
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org qa-org \
            --test-level RunLocalTests \
            --coverage-formatters text-summary \
            --coverage-formatters json-summary \
            --coverage-formatters json \
            --results-dir coverage-deploy \
            --wait 30

      - name: Upload QA coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-apex-coverage
          path: |
            coverage
            coverage-deploy