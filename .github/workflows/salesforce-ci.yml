name: Salesforce CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-pr:
    name: Validate Pull Request
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli
          sf --version

      - name: Create JWT key file
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key

      - name: Authenticate to Dev Salesforce
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "${{ secrets.SF_INSTANCE_URL }}" \
            --alias dev-org

      - name: Validate deployment against Dev
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --target-org dev-org \
            --test-level RunLocalTests \
            --wait 30

  deploy-dev:
    name: Deploy to Dev
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli
          sf --version

      - name: Create JWT key file
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key

      - name: Authenticate to Dev Salesforce
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "${{ secrets.SF_INSTANCE_URL }}" \
            --alias dev-org

      - name: Deploy to Dev
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org dev-org \
            --test-level RunLocalTests \
            --wait 30

  deploy-qa:
    name: Deploy to QA
    if: github.event_name == 'push'
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli
          sf --version

      - name: Create JWT key file
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key

      - name: Authenticate to QA Salesforce
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "${{ secrets.SF_INSTANCE_URL }}" \
            --alias qa-org

      - name: Deploy to QA
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org qa-org \
            --test-level RunLocalTests \
            --wait 30