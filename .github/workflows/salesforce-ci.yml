name: Salesforce CI/CD

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      target_sandbox:
        description: "Select target sandbox/environment"
        required: true
        type: environment

jobs:
  deploy-dev:
    name: Validate, Test, and Deploy to Dev
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli
          sf --version

      - name: Create JWT key file
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key
          chmod 600 server.key

      - name: Authenticate to Dev Salesforce
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "${{ secrets.SF_INSTANCE_URL }}" \
            --alias dev-org

      - name: Validate deployment and run Apex tests
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --target-org dev-org \
            --test-level RunLocalTests \
            --coverage-formatters text-summary \
            --coverage-formatters json-summary \
            --coverage-formatters json \
            --results-dir coverage \
            --wait 30

      - name: Show Apex test and coverage details
        if: always()
        run: |
          echo ""
          echo "========== CLASSES WITH INSUFFICIENT COVERAGE =========="
          if [ -f coverage/coverage/coverage-summary.json ]; then
            jq -r 'to_entries[] | select(.value.lines.pct < 75) | "  - \(.key): \(.value.lines.pct)% coverage (\(.value.lines.covered)/\(.value.lines.total) lines)"' coverage/coverage/coverage-summary.json 2>/dev/null || echo "Unable to parse coverage data"
          else
            echo "No coverage data available"
          fi

          echo ""
          echo "========== COVERAGE TEXT SUMMARY =========="
          if [ -f coverage/coverage/text-summary.txt ]; then
            cat coverage/coverage/text-summary.txt
          else
            echo "No text summary available"
          fi

      - name: Deploy to Dev
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org dev-org \
            --test-level RunLocalTests \
            --coverage-formatters text-summary \
            --coverage-formatters json-summary \
            --coverage-formatters json \
            --results-dir coverage-deploy \
            --wait 30

      - name: Upload Dev coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-apex-coverage
          path: |
            coverage
            coverage-deploy

  deploy-qa:
    name: Deploy to QA
    if: github.event_name == 'push'
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli
          sf --version

      - name: Create JWT key file
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key
          chmod 600 server.key

      - name: Authenticate to QA Salesforce
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "${{ secrets.SF_INSTANCE_URL }}" \
            --alias qa-org

      - name: Validate deployment and run Apex tests
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --target-org qa-org \
            --test-level RunLocalTests \
            --coverage-formatters text-summary \
            --coverage-formatters json-summary \
            --coverage-formatters json \
            --results-dir qa-coverage \
            --wait 30

      - name: Show QA Apex test and coverage details
        if: always()
        run: |
          echo ""
          echo "========== QA CLASSES WITH INSUFFICIENT COVERAGE =========="
          if [ -f qa-coverage/coverage/coverage-summary.json ]; then
            jq -r 'to_entries[] | select(.value.lines.pct < 75) | "  - \(.key): \(.value.lines.pct)% coverage (\(.value.lines.covered)/\(.value.lines.total) lines)"' qa-coverage/coverage/coverage-summary.json 2>/dev/null || echo "Unable to parse coverage data"
          else
            echo "No coverage data available"
          fi

          echo ""
          echo "========== QA COVERAGE TEXT SUMMARY =========="
          if [ -f qa-coverage/coverage/text-summary.txt ]; then
            cat qa-coverage/coverage/text-summary.txt
          else
            echo "No text summary available"
          fi

      - name: Deploy to QA
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org qa-org \
            --test-level RunLocalTests \
            --coverage-formatters text-summary \
            --coverage-formatters json-summary \
            --coverage-formatters json \
            --results-dir qa-coverage-deploy \
            --wait 30

      - name: Upload QA coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-apex-coverage
          path: |
            qa-coverage
            qa-coverage-deploy

  deploy-sandbox:
    name: Deploy to Sandbox - ${{ inputs.target_sandbox }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_sandbox }}

    steps:
      - name: Validate sandbox input
        run: |
          TARGET="${{ inputs.target_sandbox }}"
          VALID_LIST="${{ vars.SANDBOX_LIST }}"

          echo "Requested sandbox: $TARGET"
          echo "Allowed sandboxes: $VALID_LIST"

          if echo "$VALID_LIST" | tr ',' '\n' | grep -qx "$TARGET"; then
            echo "Sandbox '$TARGET' is valid"
          else
            echo "'$TARGET' is not a recognised sandbox"
            echo "Valid options are: $VALID_LIST"
            exit 1
          fi

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli
          sf --version

      - name: Create JWT key file
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key
          chmod 600 server.key

      - name: Authenticate to Sandbox Salesforce
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "${{ secrets.SF_INSTANCE_URL }}" \
            --alias sandbox-org

      - name: Validate deployment and run Apex tests
        run: |
          sf project deploy validate \
            --source-dir force-app \
            --target-org sandbox-org \
            --test-level RunLocalTests \
            --coverage-formatters text-summary \
            --coverage-formatters json-summary \
            --coverage-formatters json \
            --results-dir sandbox-coverage \
            --wait 30

      - name: Show Sandbox Apex test and coverage details
        if: always()
        run: |
          echo ""
          echo "========== SANDBOX CLASSES WITH INSUFFICIENT COVERAGE =========="
          if [ -f sandbox-coverage/coverage/coverage-summary.json ]; then
            jq -r 'to_entries[] | select(.value.lines.pct < 75) | "  - \(.key): \(.value.lines.pct)% coverage (\(.value.lines.covered)/\(.value.lines.total) lines)"' sandbox-coverage/coverage/coverage-summary.json 2>/dev/null || echo "Unable to parse coverage data"
          else
            echo "No coverage data available"
          fi

          echo ""
          echo "========== SANDBOX COVERAGE TEXT SUMMARY =========="
          if [ -f sandbox-coverage/coverage/text-summary.txt ]; then
            cat sandbox-coverage/coverage/text-summary.txt
          else
            echo "No text summary available"
          fi

      - name: Deploy to Sandbox
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org sandbox-org \
            --test-level RunLocalTests \
            --coverage-formatters text-summary \
            --coverage-formatters json-summary \
            --coverage-formatters json \
            --results-dir sandbox-coverage-deploy \
            --wait 30

      - name: Upload Sandbox coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.target_sandbox }}-apex-coverage
          path: |
            sandbox-coverage
            sandbox-coverage-deploy